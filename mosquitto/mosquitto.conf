# Eclipse Mosquitto — CassiTrack MQTT Broker
#
# Usage:
#   docker-compose up -d
#
# Then set in application.properties:
#   mqtt.broker.embedded=false
#   mqtt.broker.host=localhost
#   mqtt.broker.port=1883
#
# The real ESP32 (Heltec WiFi LoRa 32 V4) connects to this broker
# on port 1883 using WiFi. The Spring Boot application connects as a subscriber.

listener 1883

# Accept all clients without authentication (suitable for local demo).
# For production add: password_file /mosquitto/config/passwd
allow_anonymous true

# No disk persistence — messages are in memory only.
persistence false

# Log everything to stdout (visible via: docker logs cassitrack-mqtt -f)
log_dest stdout
log_type all

