spring.application.name=omnitrack-cassitrack
server.port=8080

# ============================================================
# Google Maps Directions API
# Replace with your own key to enable real-time traffic ETA.
# Without a key the system falls back to Haversine estimation.
# ============================================================
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY
google.maps.directions.url=https://maps.googleapis.com/maps/api/directions/json

# ============================================================
# MQTT Broker — Eclipse Mosquitto via Docker Compose
#
# Start the broker before running the application:
#     docker-compose up -d
#
# The real ESP32 hardware (Heltec WiFi LoRa 32 V4) connects
# to the same host:port as the Spring Boot subscriber.
# ============================================================
mqtt.broker.host=localhost
mqtt.broker.port=1883
mqtt.topic.gps=omnitrack/bus/gps
mqtt.client.subscriber.id=omnitrack-cassitrack-server
mqtt.client.publisher.id=esp32-simulator-pub

# ============================================================
# ESP32 Simulator
# Set simulator.enabled=false when using real ESP32 hardware.
# ============================================================
simulator.enabled=true
simulator.update.interval.ms=10000

# ============================================================
# Fleet configuration — 3 bus lines in Cassino (FR)
# Each entry defines one bus: vehicle ID, SIRI metadata, stops.
# ============================================================

# --- Line 1: Railway Station → University (west direction) ---
