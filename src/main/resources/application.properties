# ============================================================
# SIRI 2.0
# ============================================================
siri.version=2.0
siri.producer.ref=OMNITRACK-CASSITRACK
siri.subscriber.ref=CASSITRACK-CENTRAL-SERVER
siri.subscription.ref=SUB-OMNITRACK-001

# HTTP POST target (SIRI push mode).
# Leave empty to use SSE only (recommended for browser-based clients).
# Set a URL to enable HTTP POST delivery to a remote CassiTrack server.
# SSE and HTTP POST are ALTERNATIVE delivery modes — see SiriPushService for details.
siri.push.url=

# ============================================================
# SSE push interval
# ============================================================
sse.push.interval.ms=60000
