fleet.buses[0].line-id=CASSINO-LINE-1
fleet.buses[0].line-name=Line 1 - Station / University
fleet.buses[0].operator=COTRAL
fleet.buses[0].direction=OUTBOUND
fleet.buses[0].journey-ref=VJ-CASSINO-001
